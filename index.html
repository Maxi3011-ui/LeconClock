<!DOCTYPE html>
<html>
<head>
<title>LeconClock</title>
</head>

<body>

<h1>LeconClock</h1>

<p id="time">0 Sekunden</p>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<script>

let seconds = 0
let timer

function start(){
  timer = setInterval(function(){
    seconds++
    document.getElementById("time").innerText = seconds + " Sekunden"
  },1000)
}

function stop(){
  clearInterval(timer)
}

</script>

</body>
</html>
